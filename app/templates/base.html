<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}IOTA VERBUM CORE{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="shell nav-shell">
      <a class="brand" href="/">IOTA VERBUM CORE</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/v1/demo">Analyse</a>
        <a href="/v1/verify/demo-record">Verify</a>
        <a href="/docs" target="_blank" rel="noreferrer">API Docs &rarr;</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/app.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
